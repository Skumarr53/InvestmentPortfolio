<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpha Machine — Multibagger Intelligence Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root[data-theme="dark"] {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface-2: #1a1a24;
      --surface-3: #22222e;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #f59e0b;
      --accent-2: #06b6d4;
      --accent-3: #8b5cf6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f97316;
      --border: #27273a;
      --gradient-1: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
      --gradient-2: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      --glow: 0 0 40px rgba(245, 158, 11, 0.15);
    }
    :root[data-theme="light"] {
      --bg: #ffffff;
      --surface: #f8fafc;
      --surface-2: #f1f5f9;
      --surface-3: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #d97706;
      --accent-2: #0891b2;
      --accent-3: #7c3aed;
      --success: #059669;
      --danger: #dc2626;
      --warning: #ea580c;
      --border: #cbd5e1;
      --gradient-1: linear-gradient(135deg, #d97706 0%, #ea580c 100%);
      --gradient-2: linear-gradient(135deg, #0891b2 0%, #7c3aed 100%);
      --glow: 0 0 40px rgba(217, 119, 6, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: all 0.3s ease;
    }
    h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .nav-container {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      padding: 0.75rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    :root[data-theme="light"] .nav-container { background: rgba(255,255,255,0.9); }
    .nav-links { display: flex; gap: 2rem; }
    .nav-link {
      color: var(--text-muted); text-decoration: none; font-size: 0.875rem;
      font-weight: 500; padding: 0.5rem 0; position: relative;
      transition: color 0.2s;
    }
    .nav-link:hover, .nav-link.active { color: var(--accent); }
    .nav-link::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--gradient-1); transform: scaleX(0);
      transition: transform 0.3s;
    }
    .nav-link:hover::after, .nav-link.active::after { transform: scaleX(1); }
    .theme-toggle {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 0.75rem; cursor: pointer;
      color: var(--text); transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); }
    .main-content { padding-top: 80px; }
    .section { padding: 3rem 2rem; max-width: 1400px; margin: 0 auto; }
    .hero {
      text-align: center; padding: 4rem 2rem;
      background: radial-gradient(ellipse at center top, rgba(245,158,11,0.1) 0%, transparent 50%);
    }
    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      background: var(--gradient-1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    .hero-stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;
      max-width: 1000px; margin: 2rem auto 0;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem; text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--glow); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .filter-bar {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
      margin: 2rem 0; padding: 1.5rem; background: var(--surface); border-radius: 16px;
      border: 1px solid var(--border);
    }
    .filter-btn {
      padding: 0.5rem 1.25rem; border-radius: 9999px; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text-muted); font-size: 0.875rem;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent); color: #000; border-color: var(--accent);
    }
    .stock-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1.5rem;
    }
    .stock-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stock-card:hover { transform: translateY(-4px); box-shadow: var(--glow); }
    .stock-header {
      padding: 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .stock-ticker {
      font-family: 'JetBrains Mono', monospace; font-size: 1.75rem; font-weight: 700;
      color: var(--accent);
    }
    .stock-name { font-size: 0.8125rem; color: var(--text-muted); }
    .stock-theme {
      display: inline-block; padding: 0.25rem 0.75rem;
      background: var(--surface-2); border-radius: 9999px;
      font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; margin-top: 0.5rem;
    }
    .conviction-badge {
      text-align: right;
    }
    .conviction-score {
      font-size: 2rem; font-weight: 700; color: var(--success);
      font-family: 'Space Grotesk', sans-serif;
    }
    .conviction-label { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; }
    .stock-body { padding: 1.5rem; }
    .stock-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
      margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);
    }
    .metric { text-align: center; }
    .metric-value { font-size: 1.125rem; font-weight: 600; }
    .metric-label { font-size: 0.625rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .dimensions { display: flex; flex-direction: column; gap: 0.75rem; }
    .dimension {
      display: grid; grid-template-columns: 100px 40px 1fr; gap: 0.75rem; align-items: center;
    }
    .dimension-name { font-size: 0.6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .dimension-score {
      font-size: 0.875rem; font-weight: 700; text-align: right;
    }
    .dimension-bar {
      height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden;
    }
    .dimension-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .dimension-detail {
      grid-column: 1 / -1; font-size: 0.75rem; color: var(--text-muted);
      line-height: 1.5; padding: 0.5rem; background: var(--surface-2);
      border-radius: 6px; margin-top: 0.25rem;
    }
    .stock-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.5rem; background: var(--surface-2);
      border-top: 1px solid var(--border);
    }
    .upside-tag {
      font-size: 0.875rem; font-weight: 700; color: var(--success);
    }
    .risk-tag {
      padding: 0.375rem 0.75rem; border-radius: 6px; font-size: 0.6875rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .risk-low { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .risk-med { background: rgba(249, 115, 22, 0.1); color: var(--warning); }
    .risk-high { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .chart-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem; margin: 3rem 0;
    }
    .chart-container { position: relative; height: 450px; }
    .hidden { display: none !important; }
    @media (max-width: 768px) {
      .hero-stats { grid-template-columns: repeat(2, 1fr); }
      .stock-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
  </style>
</head>

                  <div class="metric-value mono">${v}</div>
                  <div class="metric-label">${k}</div>
                </div>
              `).join('')}
            </div>
            <div class="dimensions">
              ${stock.dimensions.map(d => `
                <div class="dimension">
                  <span class="dimension-name">${d.name}</span>
                  <span class="dimension-score" style="color: ${themeColors[stock.theme]}">${d.score}/10</span>
                  <div class="dimension-bar">
                    <div class="dimension-fill" style="width: ${d.score * 10}%; background: ${themeColors[stock.theme]};"></div>
                  </div>
                </div>
                <div class="dimension-detail">${d.detail}</div>
              `).join('')}
            </div>
          </div>
          <div class="stock-footer">
            <span class="upside-tag">3Y: ${stock.upside}</span>
            <span class="risk-tag ${stock.riskClass}">${stock.risk}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Filter Function
    function filterStocks(type, clickedBtn) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      if (clickedBtn) clickedBtn.classList.add('active');
      renderStocks(type);
    }
    
    let convictionChartInstance = null;
    function renderChart() {
      const canvas = document.getElementById('convictionChart');
      if (!canvas || stocks.length === 0) return;
      
      const ctx = canvas.getContext('2d');
      const isDark = document.documentElement.dataset.theme === 'dark';
      const textColor = isDark ? '#94a3b8' : '#64748b';
      const gridColor = isDark ? '#27273a' : '#e2e8f0';

      if (convictionChartInstance) {
        convictionChartInstance.destroy();
      }

      convictionChartInstance = new Chart(ctx, {
        type: 'bubble',
        data: {
          datasets: stocks.map(s => ({
            label: s.ticker,
            data: [{
              x: s.conviction,
              y: parseInt(s.upside),
              r: s.conviction / 5
            }],
            backgroundColor: (themeColors[s.theme] || '#f59e0b') + '80',
            borderColor: themeColors[s.theme] || '#f59e0b',
            borderWidth: 1
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              title: { display: true, text: 'Conviction Score', color: textColor, font: { size: 14, weight: '600' } },
              min: 70, max: 100,
              grid: { color: gridColor },
              ticks: { color: textColor }
            },
            y: {
              title: { display: true, text: '3Y Upside Potential (%)', color: textColor, font: { size: 14, weight: '600' } },
              min: 50, max: 500,
              grid: { color: gridColor },
              ticks: { color: textColor }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  if (!stocks[ctx.datasetIndex]) return '';
                  const stock = stocks[ctx.datasetIndex];
                  return `${stock.ticker}: ${stock.conviction}/100 | ${stock.upside} upside`;
                }
              }
            }
          }
        }
      });
    }

    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.dataset.theme === 'dark';
      html.dataset.theme = isDark ? 'light' : 'dark';
      const icon = document.getElementById('theme-icon');
      if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      renderChart();
    }
    
    function updateHeroStats() {
      const heroStatsContainer = document.getElementById('hero-stats');
      if (!heroStatsContainer) return;

      const totalPositions = stocks.length;
      const avgConviction = stocks.reduce((sum, s) => sum + s.conviction, 0) / totalPositions;
      const avgUpside = stocks.reduce((sum, s) => sum + parseInt(s.upside), 0) / totalPositions;
      const totalThemes = new Set(stocks.map(s => s.theme)).size;

      heroStatsContainer.innerHTML = `
        <div class="stat-card">
          <div class="stat-value mono">${totalPositions}</div>
          <div class="stat-label">Positions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value mono">${Math.round(avgConviction)}<span style="font-size:1rem;">/100</span></div>
          <div class="stat-label">Avg Conviction</div>
        </div>
        <div class="stat-card">
          <div class="stat-value mono">${Math.round(avgUpside)}%</div>
          <div class="stat-label">Avg 3Y Upside</div>
        </div>
        <div class="stat-card">
          <div class="stat-value mono">${totalThemes}</div>
          <div class="stat-label">Themes</div>
        </div>
      `;
    }


    document.addEventListener('DOMContentLoaded', function() {
      // populate data, then render
      renderStocks('all');
      renderChart();
      updateHeroStats();

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          filterStocks(this.dataset.filter, this);
        });
      });
      
      const themeBtn = document.getElementById('themeToggleBtn');
      if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
    });
  </script>
</body>
</html>
