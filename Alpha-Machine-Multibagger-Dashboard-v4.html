        ticker: 'WORKMATES',
        name: 'Workmates Core2 Solutions',
        theme: 'HR Tech',
        market: 'india',
        conviction: 80,
        upside: '400%',
        risk: 'HIGH',
        riskClass: 'risk-high',
        metrics: { mcap: '₹150cr', revenue: 'N/A', model: 'Tech-led Staffing' },
        dimensions: [
            { name: 'Management', score: 7, weight: 20, detail: `Depends on the execution capabilities of the team in a competitive market.` },
            { name: 'Innovation', score: 8, weight: 25, detail: `Technology platform to disrupt the fragmented staffing industry.` },
            { name: 'Demand', score: 8, weight: 20, detail: `Benefits from the formalization of the Indian workforce, a long-term trend.` },
            { name: 'Business', score: 6, weight: 20, detail: `Success hinges on building a strong brand and a scalable tech platform.` },
            { name: 'Mispricing', score: 8, weight: 15, detail: `Potential to be a significant player in the formalization of the Indian workforce.` }
        ]
      },
      {
          ticker: 'SAFE',
          name: 'Safe Enterprises',
          theme: 'Industrial Safety',
          market: 'india',
          conviction: 82,
          upside: '350%',
          risk: 'MEDIUM',
          riskClass: 'risk-med',
          metrics: { mcap: '₹400cr', revenue: 'N/A', model: 'B2B Safety Solutions' },
          dimensions: [
              { name: 'Management', score: 8, weight: 20, detail: `Requires a team with strong industrial client relationships.` },
              { name: 'Innovation', score: 7, weight: 25, detail: `High-quality, innovative safety products can command high margins.` },
              { name: 'Demand', score: 9, weight: 20, detail: `Structural growth driven by India's manufacturing and industrialization push.` },
              { name: 'Business', score: 8, weight: 20, detail: `B2B model with potential for high margins and a strong brand.` },
              { name: 'Mispricing', score: 7, weight: 15, detail: `Beneficiary of the long-term "Make in India" trend.` }
          ]
      }
    ];

    // Theme Colors
    const themeColors = {
        'AI/Compute': '#f59e0b',
        'Genomics': '#10b981',
        'Space': '#8b5cf6',
        'Robotics': '#f97316',
        'Defense': '#ef4444',
        'Specialty Chemicals': '#06b6d4',
        'IT/Aviation': '#06b6d4',
        'Metals': '#f97316',
        'Healthcare/Digital': '#10b981',
        'Entertainment': '#8b5cf6',
        'HR Tech': '#f59e0b',
        'Industrial Safety': '#ef4444',
        'AI/Voice': '#06b6d4'
    };

    // Render Stocks
    function renderStocks(filter = 'all') {
      const grid = document.getElementById('stockGrid');
      grid.innerHTML = '';

      const filtered = filter === 'all' ? stocks : stocks.filter(s => s.market === filter);

      filtered.forEach(stock => {
        const card = document.createElement('div');
        card.className = `stock-card ${stock.market}`;
        card.innerHTML = `
          <div class="stock-header">
            <div>
              <div class="stock-ticker">${stock.ticker}</div>
              <div class="stock-name">${stock.name}</div>
              <span class="stock-theme" style="color: ${themeColors[stock.theme]}; border: 1px solid ${themeColors[stock.theme]};">${stock.theme}</span>
            </div>
            <div class="conviction-badge">
              <div class="conviction-score">${stock.conviction}</div>
              <div class="conviction-label">Conviction</div>
            </div>
          </div>
          <div class="stock-body">
            <div class="stock-metrics">
              ${Object.entries(stock.metrics).map(([k,v]) => `
                <div class="metric">
                  <div class="metric-value mono">${v}</div>
                  <div class="metric-label">${k}</div>
                </div>
              `).join('')}
            </div>
            <div class="dimensions">
              ${stock.dimensions.map(d => `
                <div class="dimension">
                  <span class="dimension-name">${d.name}</span>
                  <span class="dimension-score" style="color: ${themeColors[stock.theme]}">${d.score}/10</span>
                  <div class="dimension-bar">
                    <div class="dimension-fill" style="width: ${d.score * 10}%; background: ${themeColors[stock.theme]};"></div>
                  </div>
                </div>
                <div class="dimension-detail">${d.detail}</div>
              `).join('')}
            </div>
          </div>
          <div class="stock-footer">
            <span class="upside-tag">3Y: ${stock.upside}</span>
            <span class="risk-tag ${stock.riskClass}">${stock.risk}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Filter Function
    function filterStocks(type, clickedBtn) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      if (clickedBtn) clickedBtn.classList.add('active');
      renderStocks(type);
    }
    
    let convictionChartInstance = null;
    function renderChart() {
      const canvas = document.getElementById('convictionChart');
      if (!canvas || stocks.length === 0) return;
      
      const ctx = canvas.getContext('2d');
      const isDark = document.documentElement.dataset.theme === 'dark';
      const textColor = isDark ? '#94a3b8' : '#64748b';
      const gridColor = isDark ? '#27273a' : '#e2e8f0';

      if (convictionChartInstance) {
        convictionChartInstance.destroy();
      }

      convictionChartInstance = new Chart(ctx, {
        type: 'bubble',
        data: {
          datasets: stocks.map(s => ({
            label: s.ticker,
            data: [{
              x: s.conviction,
              y: parseInt(s.upside),
              r: s.conviction / 5
            }],
            backgroundColor: (themeColors[s.theme] || '#f59e0b') + '80',
            borderColor: themeColors[s.theme] || '#f59e0b',
            borderWidth: 1
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              title: { display: true, text: 'Conviction Score', color: textColor, font: { size: 14, weight: '600' } },
              min: 70, max: 100,
              grid: { color: gridColor },
              ticks: { color: textColor }
            },
            y: {
              title: { display: true, text: '3Y Upside Potential (%)', color: textColor, font: { size: 14, weight: '600' } },
              min: 50, max: 600,
              grid: { color: gridColor },
              ticks: { color: textColor }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  if (!stocks[ctx.datasetIndex]) return '';
                  const stock = stocks[ctx.datasetIndex];
                  return `${stock.ticker}: ${stock.conviction}/100 | ${stock.upside} upside`;
                }
              }
            }
          }
        }
      });
    }

    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.dataset.theme === 'dark';
      html.dataset.theme = isDark ? 'light' : 'dark';
      const icon = document.getElementById('theme-icon');
      if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      renderChart();
    }
    
    function updateHeroStats() {
      const heroStatsContainer = document.getElementById('hero-stats');
      if (!heroStatsContainer) return;

      const totalPositions = stocks.length;
      const avgConviction = stocks.reduce((sum, s) => sum + s.conviction, 0) / totalPositions;
      const avgUpside = stocks.reduce((sum, s) => sum + parseInt(s.upside), 0) / totalPositions;
      const totalThemes = new Set(stocks.map(s => s.theme)).size;

      heroStatsContainer.innerHTML = `
        <div class="stat-card">
          <div class="stat-value mono">${totalPositions}</div>
          <div class="stat-label">Positions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value mono">${Math.round(avgConviction)}<span style="font-size:1rem;">/100</span></div>
          <div class="stat-label">Avg Conviction</div>
        </div>
        <div class="stat-card">
          <div class="stat-value mono">${Math.round(avgUpside)}%</div>
          <div class="stat-label">Avg 3Y Upside</div>
        </div>
        <div class="stat-card">
          <div class="stat-value mono">${totalThemes}</div>
          <div class="stat-label">Themes</div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', function() {
      // populate data, then render
      renderStocks('all');
      renderChart();
      updateHeroStats();

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          filterStocks(this.dataset.filter, this);
        });
      });
      
      const themeBtn = document.getElementById('themeToggleBtn');
      if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
    });
  </script>
</body>
</html>
